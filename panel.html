<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Riddicrash Commands Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" data-tab="general">General</button>
  <button class="tab-btn" data-tab="games">Games</button>
  <button class="tab-btn" data-tab="fun">Fun</button>
</div>

<div id="general" class="tab-content active">
  <ul class="command-list">
    <li><span class="command-name">!lurk</span>Chill in chat</li>
    <li><span class="command-name">!so</span>Shoutout a viewer</li>
    <li><span class="command-name">!discord</span>Join the Discord</li>
  </ul>
</div>

<div id="games" class="tab-content">
  <ul class="command-list">
    <li><span class="command-name">!duel</span>Challenge someone</li>
    <li><span class="command-name">!rank</span>Check ranking</li>
  </ul>
</div>

<div id="fun" class="tab-content">
  <ul class="command-list">
    <li><span class="command-name">!joke</span>Get a random joke</li>
    <li><span class="command-name">!quote</span>Get a funny quote</li>
  </ul>
</div>

<script src="script.js"></script>
</body>
</html>
